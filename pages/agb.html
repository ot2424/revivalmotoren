<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AGB – Teuto Motoren</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./shared-pages.css">
<link rel="stylesheet" href="../assets/ui/mobile-nav.css">
<link rel="stylesheet" href="../assets/ui/scroll-top.css">
<link rel="stylesheet" href="../assets/ui/consent-banner.css">
<link rel="stylesheet" href="../assets/ui/shared-footer.css">
<link rel="stylesheet" href="../assets/ui/floating-contact.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:
    radial-gradient(circle at top left, rgba(255,255,255,.045), transparent 28%),
    radial-gradient(circle at 85% 18%, rgba(99,117,150,.10), transparent 24%),
    linear-gradient(180deg,#0e0f11 0%,#131416 52%,#111214 100%);
  --surface:rgba(18,19,21,.86);
  --surface-solid:#14161a;
  --surface-soft:#17191d;
  --ink:#f2eee7;
  --text:rgba(228,222,212,.78);
  --muted:rgba(200,194,184,.66);
  --line:rgba(255,255,255,.08);
  --shadow:0 22px 60px rgba(0,0,0,.28);
  --hero:#0d0e10;
  --hero-text:#f6f2eb;
  --hero-soft:rgba(244,239,231,.74);
  --btn:#f3efe7;
  --btn-text:#111214;
  --accent:#b81d24;
  --accent-soft:#e0474d;
  --red-line:linear-gradient(90deg, rgba(224,71,77,1), rgba(224,71,77,.34), rgba(224,71,77,0));
  --red-line-soft:linear-gradient(90deg, rgba(224,71,77,.74), rgba(224,71,77,.18), rgba(224,71,77,0));
  --red-shadow:0 0 20px rgba(224,71,77,.18);
}
body{
  font-family:'Geist',system-ui,-apple-system,sans-serif;
  background:var(--bg);
  color:var(--ink);
  line-height:1.72;
}
::selection{background:var(--ink);color:#111214}
a{color:inherit}
.page{
  width:calc(100% - 24px);
  margin:0 auto;
  padding:16px 0 56px;
}
.topbar{
  position:sticky;
  top:12px;
  z-index:30;
  display:grid;
  grid-template-columns:auto minmax(0,1fr) auto;
  align-items:center;
  gap:16px;
  padding:10px;
  border-radius:28px;
  background:var(--surface);
  border:1px solid var(--line);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  box-shadow:var(--shadow);
  overflow:visible;
}
.brand{
  display:flex;
  align-items:center;
  gap:12px;
  min-width:0;
  padding:9px 18px 9px 9px;
  border-radius:24px;
  text-decoration:none;
  background:linear-gradient(180deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,.02) 100%);
  border:1px solid rgba(255,255,255,.06);
  min-height:70px;
}
.brand-icon{
  width:64px;
  height:64px;
  border-radius:18px;
  overflow:hidden;
  background:
    radial-gradient(circle at 30% 20%, rgba(49,51,55,.92), rgba(23,25,28,.92)),
    linear-gradient(180deg,#1c1f23 0%,#121417 100%);
  border:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  box-shadow:0 12px 28px rgba(0,0,0,.14);
}
.brand-icon img{
  width:112%;
  height:112%;
  object-fit:cover;
  object-position:center 44%;
  padding:0;
  filter:drop-shadow(0 8px 16px rgba(0,0,0,.22));
  transform:translateY(10%) scale(1.4);
}
.brand-copy{min-width:0}
.brand-name{
  display:block;
  font-size:20px;
  font-weight:800;
  letter-spacing:-.045em;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.brand-tagline{
  display:block;
  font-size:12px;
  font-weight:650;
  color:var(--muted);
  line-height:1.1;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.topbar-actions{
  display:flex;
  align-items:center;
  gap:10px;
}
.topbar-mobile-toggle{display:none;width:46px;height:46px;border-radius:14px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);color:var(--ink);align-items:center;justify-content:center;cursor:pointer}
.topbar-mobile-toggle svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round}
.topbar-mobile-panel{position:absolute;left:0;right:0;top:calc(100% + 10px);padding:10px;border-radius:24px;background:rgba(15,16,19,.96);border:1px solid rgba(255,255,255,.08);box-shadow:var(--shadow);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);display:none}
.topbar-mobile-panel.is-open{display:grid;gap:10px}
.topbar-mobile-panel nav{display:grid;gap:6px}
.topbar-mobile-panel nav a{min-height:48px;padding:0 16px;border-radius:16px;display:flex;align-items:center;text-decoration:none;color:var(--ink);background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);font-size:14px;font-weight:650}
.topbar-mobile-panel nav a:hover,
.topbar-mobile-panel nav a.is-active{background:rgba(184,29,36,.22);border-color:rgba(224,71,77,.36)}
.topbar-mobile-actions{display:grid;gap:8px}
.topbar-center{
  min-width:0;
  display:flex;
  justify-content:center;
}
.topbar-nav{
  display:flex;
  list-style:none;
  gap:4px;
  align-items:center;
  padding:6px;
  border-radius:999px;
  background:linear-gradient(180deg, rgba(255,255,255,.05) 0%, rgba(255,255,255,.02) 100%);
  border:1px solid rgba(255,255,255,.06);
  max-width:100%;
  overflow:auto;
}
.topbar-nav a{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:42px;
  padding:0 18px;
  border-radius:999px;
  text-decoration:none;
  white-space:nowrap;
  color:var(--muted);
  font-size:14px;
  font-weight:650;
  transition:background .2s ease,color .2s ease,transform .2s ease,box-shadow .2s ease;
}
.topbar-nav a:hover{
  color:var(--ink);
  background:linear-gradient(180deg, rgba(184,29,36,.28), rgba(255,255,255,.06));
  box-shadow:inset 0 0 0 1px rgba(224,71,77,.42), 0 0 18px rgba(184,29,36,.16);
  transform:translateY(-1px);
}
.back-link{
  min-height:48px;
  padding:0 20px;
  border-radius:999px;
  border:1px solid transparent;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:750;
  background:var(--btn);
  color:var(--btn-text);
  letter-spacing:-.02em;
}
.nav-contact{
  min-height:48px;
  padding:0 20px;
  border-radius:999px;
  background:#f3efe7;
  color:#111214;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:750;
  letter-spacing:-.02em;
}
.hero{
  position:relative;
  overflow:hidden;
  isolation:isolate;
  margin-top:18px;
  padding:34px;
  border-radius:34px;
  background:linear-gradient(180deg, rgba(17,18,20,.98) 0%, rgba(12,13,15,.98) 100%);
  border:1px solid rgba(255,255,255,.06);
  color:var(--hero-text);
  box-shadow:var(--shadow);
}
.hero::before{
  content:'';
  position:absolute;
  top:0;
  left:28px;
  right:28px;
  height:2px;
  background:var(--red-line);
  box-shadow:var(--red-shadow);
}
.eyebrow{
  display:inline-flex;
  align-items:center;
  gap:10px;
  margin-bottom:14px;
  font-size:12px;
  font-weight:800;
  letter-spacing:.14em;
  text-transform:uppercase;
  color:var(--accent-soft);
}
.eyebrow::before{
  content:'';
  width:36px;
  height:2px;
  border-radius:999px;
  background:var(--red-line);
  box-shadow:var(--red-shadow);
}
.hero h1{
  font-size:clamp(34px,6vw,72px);
  line-height:.95;
  letter-spacing:-.06em;
  max-width:900px;
  margin-bottom:16px;
}
.hero p{
  max-width:760px;
  font-size:16px;
  line-height:1.82;
  color:var(--hero-soft);
}
.content-grid{
  margin-top:18px;
  display:grid;
  grid-template-columns:minmax(0,1.2fr) minmax(280px,.58fr);
  gap:18px;
  align-items:start;
}
.content-card,
.side-card{
  position:relative;
  overflow:hidden;
  border-radius:30px;
  background:var(--surface);
  border:1px solid var(--line);
  box-shadow:var(--shadow);
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
}
.content-card::before,
.side-card::before{
  content:'';
  position:absolute;
  top:0;
  left:24px;
  right:24px;
  height:2px;
  background:var(--red-line-soft);
}
.content-card{padding:28px}
.side-card{
  position:sticky;
  top:98px;
  padding:24px;
}
.section-title{
  font-size:28px;
  line-height:1;
  letter-spacing:-.04em;
  margin-bottom:20px;
}
.legal-group + .legal-group{
  margin-top:28px;
  padding-top:28px;
  border-top:1px solid var(--line);
}
.legal-group h3{
  font-size:24px;
  line-height:1.05;
  letter-spacing:-.04em;
  margin-bottom:18px;
}
.legal-block + .legal-block{margin-top:20px}
.legal-block h4{
  font-size:17px;
  line-height:1.35;
  letter-spacing:-.02em;
  margin-bottom:10px;
  color:var(--ink);
}
.legal-block p{
  font-size:14px;
  color:var(--text);
}
.legal-block p + p{margin-top:10px}
.side-title{
  font-size:22px;
  line-height:1;
  letter-spacing:-.04em;
  margin-bottom:12px;
}
.side-copy{
  font-size:14px;
  color:var(--text);
  line-height:1.75;
  margin-bottom:18px;
}
.contact-list{
  display:grid;
  gap:10px;
  margin-bottom:18px;
}
.contact-item{
  position:relative;
  overflow:hidden;
  padding:14px 16px;
  border-radius:18px;
  background:var(--surface-soft);
  border:1px solid var(--line);
  transition:border-color .22s ease, box-shadow .22s ease;
}
.contact-item::before{
  content:'';
  position:absolute;
  left:0;
  top:12px;
  bottom:12px;
  width:2px;
  background:linear-gradient(180deg, rgba(224,71,77,.82), rgba(224,71,77,0));
}
.contact-item:hover{
  border-color:rgba(224,71,77,.28);
  box-shadow:0 14px 34px rgba(184,29,36,.1);
}
.contact-item strong{
  display:block;
  font-size:12px;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:4px;
}
.contact-item span,
.contact-item a{
  font-size:14px;
  color:var(--ink);
  text-decoration:none;
}
.note{
  position:relative;
  padding:16px 18px;
  border-radius:18px;
  background:var(--surface-soft);
  border:1px solid rgba(224,71,77,.18);
  box-shadow:0 12px 28px rgba(184,29,36,.08);
  font-size:13px;
  color:var(--text);
  line-height:1.75;
}
.floating-contact{
  position:fixed;
  right:20px;
  bottom:20px;
  z-index:440;
  min-height:54px;
  padding:0 20px;
  border-radius:999px;
  background:#f3efe7;
  color:#111214;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:14px;
  font-weight:800;
  letter-spacing:-.02em;
  box-shadow:0 18px 42px rgba(0,0,0,.24);
}
@media(max-width:980px){
  .content-grid{grid-template-columns:1fr}
  .side-card{position:static}
  .topbar{
    grid-template-columns:1fr;
  }
  .topbar-center{
    justify-content:flex-start;
  }
}
@media(max-width:768px){
  .page{width:calc(100% - 12px);padding-top:12px}
  .topbar{grid-template-columns:minmax(0,1fr) auto;gap:10px;border-radius:24px}
  .topbar-center,.topbar-actions{display:none}
  .topbar-mobile-toggle{display:flex}
  .topbar-mobile-panel{
    border-color:rgba(224,71,77,.22);
    box-shadow:var(--shadow),0 0 24px rgba(184,29,36,.12);
  }
  .topbar-mobile-panel nav a{
    border-color:rgba(224,71,77,.16);
  }
  .topbar-nav{
    width:100%;
    justify-content:flex-start;
  }
  .brand-name{font-size:18px}
  .brand-tagline{font-size:11px}
  .hero{padding:24px;border-radius:28px;border-color:rgba(224,71,77,.14)}
  .hero::before,
  .content-card::before,
  .side-card::before{
    left:16px;
    right:16px;
    height:3px;
    box-shadow:0 0 20px rgba(224,71,77,.24);
  }
  .content-card,.side-card{padding:22px;border-radius:24px;border-color:rgba(224,71,77,.14)}
  .section-title{font-size:24px}
  .legal-group h3{font-size:20px}
  .back-link,.nav-contact{flex:1}
  .floating-contact{
    right:12px;
    bottom:12px;
    min-height:50px;
    padding:0 16px;
    font-size:13px;
  }
}
</style>
</head>
<body data-root="..">
  <div class="page">
    <div class="topbar">
      <a href="../index.html" class="brand">
        <span class="brand-icon"><img id="brandLogo" src="../assets/branding/teuto-logo-symbol.png" alt="Teuto Motoren Logo"></span>
        <span class="brand-copy">
          <span class="brand-name">Teuto Motoren</span>
          <span class="brand-tagline">Wir leben Motoren</span>
        </span>
      </a>
      <div class="topbar-center">
        <ul class="topbar-nav" id="legalNav"></ul>
      </div>
      <div class="topbar-actions">
        <a class="nav-contact" href="kontakt.html">Angebot anfragen</a>
      </div>
      <button class="topbar-mobile-toggle mnav-toggle" id="topbarMobileToggle" type="button" aria-label="Menü öffnen" aria-expanded="false"></button>
      <div class="topbar-mobile-panel" id="topbarMobilePanel">
        <nav id="legalMobileNav"></nav>
        <div class="topbar-mobile-actions">
          <a class="nav-contact" href="kontakt.html">Angebot anfragen</a>
        </div>
      </div>
    </div>

    <section class="hero">
      <span class="eyebrow" id="heroEyebrow"></span>
      <h1 id="heroTitle"></h1>
      <p id="heroSubtitle"></p>
    </section>

    <section class="content-grid">
      <article class="content-card">
        <h2 class="section-title">AGB & Kundeninformationen</h2>
        <div id="legalContent"></div>
      </article>

      <aside class="side-card">
        <h2 class="side-title">Unternehmensdaten</h2>
        <p class="side-copy">Die folgenden Angaben fassen die wichtigsten Unternehmens- und Kontaktinformationen für diese Rechteseite kompakt zusammen.</p>
        <div class="contact-list" id="companyDetails"></div>
        <div class="note" id="legalNote"></div>
      </aside>
    </section>
  </div>

  <a class="floating-contact" id="floatingContact" href="kontakt.html">Kontakt aufnehmen</a>
  <div data-shared-footer></div>

  <script src="../content/site-core.js"></script>
  <script src="../content/agb-content.js"></script>
  <script src="../assets/ui/mobile-nav.js"></script>
  <script src="../assets/ui/scroll-top.js"></script>
  <script src="../assets/ui/consent-banner.js"></script>
  <script src="../assets/ui/shared-footer.js"></script>
  <script src="../assets/ui/floating-contact.js"></script>
  <script>
    const asset = (path) => {
      if (!path) return '';
      if (/^(https?:|mailto:|tel:|#|\.\.\/)/.test(path)) return path;
      return `../${path}`;
    };

    const brandLogo = document.getElementById('brandLogo');
    const legalNav = document.getElementById('legalNav');
    const floatingContact = document.getElementById('floatingContact');
    if(brandLogo && window.siteContent && window.siteContent.logo){
      brandLogo.src = asset(window.siteContent.logo.dark || window.siteContent.logo.light);
    }

    if(legalNav){
      const legalNavItems = [
        { label: 'Leistungen', href: '../index.html#leistungen' },
        { label: 'Referenzen', href: 'projekte.html' },
        { label: 'Motoren', href: 'motoren.html' },
        { label: 'Über uns', href: 'ueber-uns.html' },
        { label: 'Kontakt', href: 'kontakt.html' }
      ];
      legalNav.innerHTML = legalNavItems.map(item => `
        <li><a href="${item.href}">${item.label}</a></li>
      `).join('');
      const legalMobileNav = document.getElementById('legalMobileNav');
      if(legalMobileNav){
        legalMobileNav.innerHTML = [{ label: 'Startseite', href: '../index.html' }, ...legalNavItems]
          .map(item => `<a href="${item.href}">${item.label}</a>`)
          .join('');
      }
    }

    const whatsappNumber = window.siteContent && window.siteContent.business ? window.siteContent.business.whatsappNumber.replace(/\D/g,'') : '';
    const whatsappMessage = window.siteContent && window.siteContent.business ? String(window.siteContent.business.whatsappMessage || '').trim() : '';
    if(floatingContact && whatsappNumber){
      floatingContact.href = `https://wa.me/${whatsappNumber}${whatsappMessage ? `?text=${encodeURIComponent(whatsappMessage)}` : ''}`;
      floatingContact.target = '_blank';
      floatingContact.rel = 'noopener noreferrer';
      floatingContact.textContent = 'WhatsApp Anfrage';
    }

    const data = window.agbContent;

    document.getElementById('heroEyebrow').textContent = data.hero.eyebrow;
    document.getElementById('heroTitle').textContent = data.hero.title;
    document.getElementById('heroSubtitle').textContent = data.hero.subtitle || '';
    document.getElementById('legalNote').textContent = data.note || 'Bitte prüfen Sie diese Rechtstexte vor der finalen Veröffentlichung noch einmal zusammen mit Ihren verbindlichen Unternehmensangaben.';

    const primaryPhone = (data.company.phone || '').split('/')[0].trim();
    const companyDetails = [
      { label: 'Unternehmen', value: data.company.name },
      { label: 'Adresse', value: `${data.company.street}, ${data.company.city}` },
      { label: 'E-Mail', value: data.company.email, href: data.company.email.startsWith('[') ? '' : `mailto:${data.company.email}` },
      { label: 'Telefon', value: data.company.phone, href: primaryPhone.startsWith('[') ? '' : `tel:${primaryPhone.replace(/\s+/g,'')}` }
    ];

    document.getElementById('companyDetails').innerHTML = companyDetails.map(item => `
      <div class="contact-item">
        <strong>${item.label}</strong>
        ${item.href ? `<a href="${item.href}">${item.value}</a>` : `<span>${item.value}</span>`}
      </div>
    `).join('');

    document.getElementById('legalContent').innerHTML = data.sections.map(section => `
      <section class="legal-group">
        <h3>${section.title}</h3>
        ${section.blocks.map(block => `
          <div class="legal-block">
            <h4>${block.heading}</h4>
            ${block.paragraphs.map(paragraph => `<p>${paragraph}</p>`).join('')}
          </div>
        `).join('')}
      </section>
    `).join('');
    window.SharedMobileNav?.bind({ toggleId:'topbarMobileToggle', panelId:'topbarMobilePanel' });
  </script>
</body>
</html>
