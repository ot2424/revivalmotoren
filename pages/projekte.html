<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Projekte & Referenzen – Teuto Motoren</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/ui/mobile-nav.css">
  <link rel="stylesheet" href="../assets/ui/scroll-top.css">
  <link rel="stylesheet" href="../assets/ui/consent-banner.css">
  <link rel="stylesheet" href="../assets/ui/shared-footer.css">
  <link rel="stylesheet" href="../assets/ui/floating-contact.css">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth;overflow-x:hidden}
    body{
      font-family:'Geist',system-ui,-apple-system,sans-serif;
      color:#f3f1ec;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.05), transparent 32%),
        linear-gradient(180deg,#0a0c0f 0%, #090b0e 100%);
      overflow-x:hidden;
    }
    a{color:inherit;text-decoration:none}
    img{display:block;max-width:100%}

    .page{padding:18px 0 88px}
    .shell{width:min(calc(100% - 24px), 1560px);margin:0 auto}

    .topbar{
      position:sticky;top:14px;z-index:40;
      width:min(calc(100% - 24px), 1450px);
      margin:0 auto 24px;
      padding:12px;
      border:1px solid rgba(255,255,255,.08);
      border-radius:32px;
      background:rgba(13,15,18,.82);
      backdrop-filter:blur(18px);
      box-shadow:0 24px 80px rgba(0,0,0,.35);
      overflow:visible;
    }
    .topbar-layout{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:14px;align-items:center}
    .topbar-brand{
      display:flex;align-items:center;gap:12px;min-width:0;
      padding:8px 16px 8px 8px;border-radius:24px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
    }
    .topbar-brand-icon{
      width:74px;height:74px;border-radius:20px;flex-shrink:0;
      display:flex;align-items:center;justify-content:center;
      overflow:hidden;
      background:linear-gradient(180deg,#1b2027,#111418);
      border:1px solid rgba(255,255,255,.08);
      box-shadow:0 12px 28px rgba(0,0,0,.18);
    }
    .topbar-brand-icon img{
      width:112%;
      height:112%;
      object-fit:cover;
      object-position:center 44%;
      filter:drop-shadow(0 8px 16px rgba(0,0,0,.22));
      transform:translateY(10%) scale(1.4);
    }
    .topbar-brand-copy{display:flex;flex-direction:column;gap:4px;min-width:0}
    .topbar-brand-copy strong{font-size:20px;line-height:1;letter-spacing:-.045em}
    .topbar-brand-copy span{font-size:12px;color:#b7b2a8;line-height:1.1}
    .topbar-nav{display:flex;justify-content:center;min-width:0}
    .topbar-nav ul{
      list-style:none;display:flex;gap:4px;align-items:center;
      padding:6px;margin:0;border-radius:999px;
      background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);
      max-width:100%;
    }
    .topbar-nav a{
      display:inline-flex;align-items:center;justify-content:center;
      min-height:46px;padding:0 18px;border-radius:999px;
      color:#b7b2a8;font-size:14px;font-weight:650;white-space:nowrap;
    }
    .topbar-nav a.is-active,.topbar-nav a:hover{background:rgba(255,255,255,.08);color:#f3f1ec}
    .topbar-actions{display:flex;align-items:center;gap:10px}
    .topbar-mobile-toggle{
      display:none;
      width:46px;height:46px;border-radius:14px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(255,255,255,.04);color:#f3f1ec;
      align-items:center;justify-content:center;cursor:pointer;
    }
    .topbar-mobile-toggle svg{
      width:20px;height:20px;stroke:currentColor;fill:none;
      stroke-width:1.8;stroke-linecap:round;
    }
    .topbar-mobile-panel{
      position:absolute;left:0;right:0;top:calc(100% + 10px);
      padding:10px;border-radius:24px;
      background:rgba(15,16,19,.96);border:1px solid rgba(255,255,255,.08);
      box-shadow:0 24px 80px rgba(0,0,0,.35);
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
      display:none;
    }
    .topbar-mobile-panel.is-open{display:grid;gap:10px}
    .topbar-mobile-panel nav{display:grid;gap:6px}
    .topbar-mobile-panel nav a{
      min-height:48px;padding:0 16px;border-radius:16px;
      display:flex;align-items:center;
      background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
      color:#f3f1ec;font-size:14px;font-weight:650;
    }
    .topbar-mobile-panel nav a.is-active{background:rgba(255,255,255,.08)}
    .topbar-mobile-actions{display:grid;gap:8px}
    .ghost-btn,.solid-btn{
      min-height:50px;padding:0 20px;border-radius:999px;
      display:inline-flex;align-items:center;justify-content:center;
      font-size:14px;font-weight:750;border:1px solid rgba(255,255,255,.08);
    }
    .ghost-btn{background:rgba(255,255,255,.04);color:#f3f1ec}
    .solid-btn{background:#f3f1ec;color:#101215;border-color:transparent}

    .hero{
      position:relative;overflow:hidden;min-height:78vh;
      border-radius:40px;border:1px solid rgba(255,255,255,.08);
      background:#0e1014;box-shadow:0 24px 80px rgba(0,0,0,.35);
    }
    .hero img{
      position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
      filter:brightness(.5) saturate(.84);
    }
    .hero::after{
      content:"";position:absolute;inset:0;
      background:
        linear-gradient(90deg, rgba(9,11,14,.86) 0%, rgba(9,11,14,.62) 42%, rgba(9,11,14,.2) 100%),
        linear-gradient(180deg, rgba(9,11,14,.08) 0%, rgba(9,11,14,.74) 100%);
    }
    .hero-copy{
      position:relative;z-index:1;max-width:760px;min-height:78vh;
      display:flex;align-items:flex-end;padding:42px;
    }
    .eyebrow{display:inline-flex;font-size:12px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:#b7b2a8;margin-bottom:12px}
    .hero-title{font-size:clamp(3rem,7vw,6.2rem);line-height:.92;letter-spacing:-.08em}
    .hero-text{margin-top:16px;max-width:680px;color:#b7b2a8;line-height:1.8;font-size:15px}
    .hero-actions{display:flex;flex-wrap:wrap;gap:12px;margin-top:24px}

    .section{
      margin-top:22px;
    }
    .section-head{
      display:flex;align-items:end;justify-content:space-between;gap:18px;
      margin-bottom:24px;padding:0 10px;
    }
    .section-head h2{margin:8px 0 0;font-size:clamp(2rem,4vw,3.4rem);line-height:.95;letter-spacing:-.06em}
    .section-head p{margin:0;max-width:720px;color:#b7b2a8;line-height:1.72}

    .projects-stack{display:flex;flex-direction:column;gap:18px}
    .project-band{
      position:relative;overflow:hidden;min-height:76vh;
      border-radius:36px;border:1px solid rgba(255,255,255,.08);
      background:#111418;
      box-shadow:0 24px 80px rgba(0,0,0,.26);
      isolation:isolate;
    }
    .project-media{
      position:absolute;inset:0;
      z-index:0;
    }
    .project-frame{
      position:absolute;inset:0;
      opacity:0;
      transition:opacity .9s ease;
      background:#0f1114;
    }
    .project-frame.is-active{opacity:1}
    .project-frame-bg,
    .project-frame-main{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
    }
    .project-frame-bg{
      object-fit:cover;
      filter:brightness(.5) saturate(.88) blur(10px);
      transform:scale(1.08);
    }
    .project-frame-main{
      object-fit:contain;
      object-position:center center;
      padding:18px;
      filter:brightness(.94) saturate(.98);
      cursor:pointer;
      z-index:1;
    }
    .project-band::after{
      content:"";position:absolute;inset:0;
      background:
        linear-gradient(90deg, rgba(7,9,12,.14) 0%, rgba(7,9,12,.1) 34%, rgba(7,9,12,.6) 100%),
        linear-gradient(180deg, rgba(7,9,12,.04) 0%, rgba(7,9,12,.52) 100%);
      pointer-events:none;
      z-index:1;
    }
    .project-band.is-top-right::after{
      background:
        linear-gradient(90deg, rgba(7,9,12,.12) 0%, rgba(7,9,12,.1) 46%, rgba(7,9,12,.62) 100%),
        linear-gradient(180deg, rgba(7,9,12,.48) 0%, rgba(7,9,12,.12) 38%, rgba(7,9,12,.48) 100%);
    }
    .project-copy{
      position:absolute;z-index:2;right:26px;bottom:26px;
      width:min(100%, 480px);
      padding:26px 28px;border-radius:30px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(12,14,18,.72);
      backdrop-filter:blur(18px);
      box-shadow:0 16px 48px rgba(0,0,0,.28);
    }
    .project-band.is-top-right .project-copy{top:26px;bottom:auto}
    .project-category{display:inline-flex;font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#b7b2a8;margin-bottom:10px}
    .project-copy h3{font-size:clamp(1.8rem,3.1vw,3rem);letter-spacing:-.06em;line-height:.96;max-width:12ch}
    .project-copy p{margin-top:14px;color:#d0cbc2;line-height:1.74;font-size:15px}
    .project-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
    .project-tags span{
      padding:10px 12px;border-radius:999px;font-size:12px;font-weight:700;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
    }

    .closing{
      position:relative;overflow:hidden;min-height:64vh;margin-top:22px;
      border-radius:40px;border:1px solid rgba(255,255,255,.08);
      background:#0e1014;
    }
    .closing-bg{
      position:absolute;inset:0;display:grid;grid-template-columns:1.2fr 1fr 1fr;grid-template-rows:repeat(2,1fr);gap:8px;padding:8px;
    }
    .closing-bg .tile:first-child{grid-row:span 2}
    .closing-bg img{width:100%;height:100%;object-fit:cover;filter:brightness(.58) saturate(.86)}
    .closing::after{
      content:"";position:absolute;inset:0;
      background:linear-gradient(180deg, rgba(9,11,14,.08) 0%, rgba(9,11,14,.78) 100%);
    }
    .closing-copy{
      position:relative;z-index:1;min-height:64vh;display:flex;align-items:flex-end;padding:34px;
    }
    .closing-card{
      max-width:620px;padding:28px;border-radius:30px;
      border:1px solid rgba(255,255,255,.08);background:rgba(11,13,16,.78);backdrop-filter:blur(16px);
    }
    .closing-card h2{margin:0;font-size:clamp(2rem,4vw,3.5rem);line-height:.96;letter-spacing:-.06em}
    .closing-card p{margin-top:14px;color:#b7b2a8;line-height:1.76}

    .gallery-lightbox{
      position:fixed;
      inset:0;
      z-index:980;
      display:none;
      align-items:center;
      justify-content:center;
      padding:22px;
      background:rgba(6,8,10,.88);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
    }
    .gallery-lightbox.is-open{display:flex}
    .gallery-lightbox-dialog{
      position:relative;
      width:min(100%, 1320px);
      height:min(88vh, 920px);
      border-radius:30px;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.1);
      background:rgba(12,14,18,.9);
      box-shadow:0 30px 100px rgba(0,0,0,.45);
    }
    .gallery-lightbox-stage{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at top, rgba(255,255,255,.08), transparent 34%),
        linear-gradient(180deg,#0c0e12 0%, #0a0c10 100%);
    }
    .gallery-lightbox-stage img{
      max-width:100%;
      max-height:100%;
      object-fit:contain;
      display:block;
    }
    .gallery-lightbox-close,
    .gallery-lightbox-nav{
      position:absolute;
      z-index:2;
      width:52px;
      height:52px;
      border:none;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(16,18,22,.76);
      color:#f3f1ec;
      box-shadow:0 14px 32px rgba(0,0,0,.28);
      cursor:pointer;
      transition:transform .2s ease, background .2s ease;
    }
    .gallery-lightbox-close:hover,
    .gallery-lightbox-nav:hover{
      background:rgba(26,28,34,.9);
      transform:translateY(-1px);
    }
    .gallery-lightbox-close{
      top:18px;
      right:18px;
      font-size:24px;
      line-height:1;
    }
    .gallery-lightbox-nav{
      top:50%;
      transform:translateY(-50%);
      font-size:26px;
      font-weight:600;
    }
    .gallery-lightbox-nav:hover{
      transform:translateY(calc(-50% - 1px));
    }
    .gallery-lightbox-nav.prev{left:18px}
    .gallery-lightbox-nav.next{right:18px}
    .gallery-lightbox-meta{
      position:absolute;
      right:18px;
      bottom:18px;
      z-index:2;
      display:flex;
      align-items:center;
      justify-content:flex-end;
    }
    .gallery-lightbox-count{
      padding:12px 14px;
      border-radius:999px;
      background:rgba(10,12,16,.68);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
      font-size:12px;
      font-weight:800;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:#b7b2a8;
      white-space:nowrap;
    }

    @media(max-width:1360px){
      .shell{width:min(calc(100% - 18px), 1560px)}
      .hero{min-height:72vh}
      .hero-copy{min-height:72vh;padding:34px}
      .project-band{min-height:68vh}
      .project-copy{width:min(100%, 452px)}
    }
    @media(max-width:1180px){
      .topbar-nav{display:none}
      .hero{min-height:66vh}
      .hero-copy{min-height:66vh}
      .project-band{min-height:62vh}
      .project-copy{width:min(100%, 440px)}
      .closing-bg{grid-template-columns:1fr 1fr;grid-template-rows:220px 160px 160px}
      .closing-bg .tile:first-child{grid-column:span 2;grid-row:auto}
    }
    @media(max-width:980px){
      .page{padding:12px 0 72px}
      .topbar{
        width:min(calc(100% - 16px), 1450px);
        margin:0 auto 18px;
        padding:10px;
      }
      .topbar-layout{grid-template-columns:minmax(0,1fr) auto;gap:10px}
      .topbar-actions{display:flex}
      .topbar-brand{
        padding:7px 12px 7px 7px;
        gap:10px;
      }
      .topbar-brand-icon{width:58px;height:58px;border-radius:16px}
      .topbar-brand-copy strong{font-size:18px}
      .topbar-brand-copy span{font-size:11px}
      .hero{min-height:58vh;border-radius:32px}
      .hero-copy{
        min-height:58vh;
        max-width:640px;
        padding:28px;
      }
      .hero-text{max-width:560px}
      .section-head{
        display:grid;
        gap:10px;
      }
      .project-band{
        min-height:54vh;
        border-radius:30px;
      }
      .project-copy,
      .project-band.is-top-right .project-copy{
        right:20px;
        top:auto;
        bottom:20px;
        width:min(calc(100% - 40px), 420px);
        padding:22px 22px;
      }
      .project-copy h3{font-size:clamp(1.7rem,4vw,2.5rem)}
      .closing{min-height:58vh;border-radius:32px}
      .closing-copy{min-height:58vh;padding:24px}
      .gallery-lightbox-dialog{height:min(82vh, 840px)}
    }
    @media(max-width:760px){
      .shell{width:min(calc(100% - 12px), 1560px)}
      .topbar{top:8px;width:min(calc(100% - 16px), 1450px);padding:10px}
      .topbar-layout{grid-template-columns:1fr auto}
      .topbar-nav{display:none}
      .topbar-actions{display:none}
      .topbar-mobile-toggle{display:flex}
      .ghost-btn,.solid-btn{
        min-height:46px;
        padding:0 16px;
        font-size:13px;
      }
      .topbar-brand{padding:6px 10px 6px 6px;border-radius:18px;gap:8px}
      .topbar-brand-icon{width:52px;height:52px;border-radius:14px}
      .topbar-brand-copy strong{font-size:16px}
      .topbar-brand-copy span{font-size:9px}
      .hero,.hero-copy{min-height:620px}
      .hero-copy{padding:20px}
      .hero-title{font-size:clamp(2.4rem,11vw,4rem)}
      .hero-text{font-size:14px}
      .section-head{display:grid;padding:0 6px}
      .project-band{
        min-height:auto;
        display:flex;flex-direction:column;
      }
      .project-media{
        position:relative;
        height:340px;
      }
      .project-frame-bg{
        transform:none;
        filter:brightness(.48) saturate(.86) blur(8px);
      }
      .project-frame-main{
        padding:12px;
      }
      .project-band::after{
        background:
          linear-gradient(180deg, rgba(7,9,12,.18) 0%, rgba(7,9,12,.54) 100%);
      }
      .project-copy,
      .project-band.is-top-right .project-copy{
        position:relative;right:auto;top:auto;bottom:auto;
        width:calc(100% - 28px);
        margin:-54px 14px 14px;
        padding:22px 20px;
      }
      .project-copy h3{max-width:none;font-size:clamp(1.7rem,8vw,2.3rem)}
      .project-copy p{font-size:14px}
      .closing-bg{grid-template-columns:1fr 1fr;grid-template-rows:180px 120px 120px}
      .closing-copy{padding:16px}
      .closing-card{padding:20px}
      .gallery-lightbox{padding:10px}
      .gallery-lightbox-dialog{
        height:min(84vh, 760px);
        border-radius:24px;
      }
      .gallery-lightbox-nav,
      .gallery-lightbox-close{
        width:44px;
        height:44px;
      }
      .gallery-lightbox-nav{font-size:22px}
      .gallery-lightbox-close{font-size:20px}
      .gallery-lightbox-nav.prev{left:10px}
      .gallery-lightbox-nav.next{right:10px}
      .gallery-lightbox-close{top:10px;right:10px}
      .gallery-lightbox-meta{
        right:10px;
        bottom:10px;
      }
    }
    @media(max-width:560px){
      .page{padding:10px 0 56px}
      .shell{width:min(calc(100% - 10px), 1560px)}
      .topbar{
        top:6px;
        width:min(calc(100% - 10px), 1450px);
        margin:0 auto 14px;
        padding:8px;
        border-radius:24px;
      }
      .topbar-brand{
        padding:5px 8px 5px 5px;
        border-radius:16px;
      }
      .topbar-brand-icon{width:42px;height:42px;border-radius:12px}
      .topbar-brand-copy strong{font-size:14px}
      .topbar-brand-copy span{font-size:8px}
      .hero,
      .hero-copy{
        min-height:560px;
        border-radius:28px;
      }
      .hero-copy{padding:16px}
      .hero-text{
        margin-top:12px;
        font-size:13px;
        line-height:1.7;
      }
      .hero-actions{
        display:grid;
        gap:10px;
      }
      .hero-actions a{
        width:100%;
      }
      .section-head{padding:0 2px}
      .section-head p{font-size:14px;line-height:1.68}
      .project-band{border-radius:24px}
      .project-media{height:290px}
      .project-copy,
      .project-band.is-top-right .project-copy{
        width:calc(100% - 20px);
        margin:-38px 10px 10px;
        padding:18px 16px;
        border-radius:22px;
      }
      .project-category{margin-bottom:8px}
      .project-copy h3{font-size:clamp(1.45rem,8.4vw,2rem);line-height:1}
      .project-copy p{
        margin-top:10px;
        font-size:13px;
        line-height:1.68;
      }
      .project-tags{
        gap:6px;
        margin-top:14px;
      }
      .project-tags span{
        padding:8px 10px;
        font-size:11px;
      }
      .closing{
        min-height:52vh;
        border-radius:28px;
      }
      .closing-bg{
        grid-template-columns:1fr 1fr;
        grid-template-rows:150px 95px 95px;
        gap:6px;
        padding:6px;
      }
      .closing-copy{
        min-height:52vh;
        padding:12px;
      }
      .closing-card{
        padding:18px 16px;
        border-radius:22px;
      }
      .closing-card p{font-size:13px;line-height:1.68}
    }
    @media(max-width:420px){
      .hero,
      .hero-copy{
        min-height:520px;
      }
      .hero-title{font-size:clamp(2.1rem,11.5vw,3.2rem)}
      .project-media{height:250px}
      .project-copy,
      .project-band.is-top-right .project-copy{
        margin:-30px 8px 8px;
        width:calc(100% - 16px);
        padding:16px 14px;
      }
      .project-copy h3{font-size:clamp(1.35rem,9vw,1.8rem)}
      .closing-bg{
        grid-template-rows:132px 86px 86px;
      }
    }
  </style>
</head>
<body data-root="..">
  <div class="page">
    <nav class="topbar">
      <div class="topbar-layout">
        <a href="../index.html" class="topbar-brand">
          <span class="topbar-brand-icon"><img src="../assets/branding/teuto-logo-symbol.png" alt="Teuto Motoren Logo"></span>
          <span class="topbar-brand-copy">
            <strong>Teuto Motoren</strong>

    <main class="shell">
      <section class="hero">
        <img src="../assets/images/projects/projekte/Motorblock.jpg" alt="Projektübersicht Teuto Motoren" loading="eager" decoding="async">
        <div class="hero-copy">
          <div>
            <span class="eyebrow" id="projectsHeroLabel"></span>
            <h1 class="hero-title" id="projectsHeroTitle"></h1>
            <p class="hero-text" id="projectsHeroText"></p>
            <div class="hero-actions">
              <a class="solid-btn" href="kontakt.html" id="projectsHeroPrimary"></a>
              <a class="ghost-btn" href="../index.html" id="projectsHeroSecondary"></a>
            </div>
          </div>
        </div>

      <section class="section">
        <div class="section-head">
          <div>
            <span class="eyebrow">Projektübersicht</span>
            <h2 id="projectsIntroTitle"></h2>
          </div>
          <p id="projectsIntroBody"></p>
        </div>
        <div class="projects-stack" id="projectsGrid"></div>
      </section>

      <section class="closing">
        <div class="closing-bg" id="closingBg"></div>
        <div class="closing-copy">
          <div class="closing-card">
            <span class="eyebrow" id="projectsClosingLabel"></span>
            <h2 id="projectsClosingTitle"></h2>
            <p id="projectsClosingBody"></p>

  <div class="gallery-lightbox" id="galleryLightbox" aria-hidden="true">
    <div class="gallery-lightbox-dialog" role="dialog" aria-modal="true" aria-label="Projektbilder">
      <button class="gallery-lightbox-close" id="galleryLightboxClose" type="button" aria-label="Schließen">×</button>
      <button class="gallery-lightbox-nav prev" id="galleryLightboxPrev" type="button" aria-label="Vorheriges Bild">‹</button>
      <button class="gallery-lightbox-nav next" id="galleryLightboxNext" type="button" aria-label="Nächstes Bild">›</button>
      <div class="gallery-lightbox-stage" id="galleryLightboxStage">
        <img id="galleryLightboxImage" src="" alt="">
      </div>
      <div class="gallery-lightbox-meta">
        <div class="gallery-lightbox-count" id="galleryLightboxCount"></div>
      </div>
    </div>
  </div>

  <script src="../content/site-core.js"></script>
  <script src="../content/projekte-content.js"></script>
  <script src="../assets/ui/mobile-nav.js"></script>
  <script src="../assets/ui/scroll-top.js"></script>
  <script src="../assets/ui/consent-banner.js"></script>
  <script src="../assets/ui/shared-footer.js"></script>
  <script src="../assets/ui/floating-contact.js"></script>
  <script>
    window.SharedMobileNav?.bind({ toggleId:'topbarMobileToggle', panelId:'topbarMobilePanel' });

    const site = window.siteContent || {};
    const page = window.projectsPageContent || {};
    const legacyProjects = Array.isArray(page.projects) ? page.projects : [];
    const projects = Array.isArray(page.showcases) && page.showcases.length
      ? page.showcases
      : legacyProjects;

    const asset = (path) => {
      if (!path) return '';
      if (/^(https?:|mailto:|tel:|#|\.\.\/)/.test(path)) return path;
      return `../${path}`;
    };

    const normalizeImages = project => {
      if (Array.isArray(project.images) && project.images.length) {
        return project.images.map(image => ({ ...image, src: asset(image.src) }));
      }
      if (project.image) {
        return [{ src: asset(project.image), alt: project.imageAlt || project.title || 'Projektbild' }];
      }
      return [];
    };

    document.getElementById('projectsHeroLabel').textContent = page.hero?.label || '';
    document.getElementById('projectsHeroTitle').textContent = page.hero?.title || '';
    document.getElementById('projectsHeroText').textContent = page.hero?.body || '';
    document.getElementById('projectsHeroPrimary').textContent = page.hero?.primaryAction || 'Anfrage senden';
    document.getElementById('projectsHeroSecondary').textContent = page.hero?.secondaryAction || 'Zur Startseite';
    document.getElementById('projectsIntroTitle').textContent = page.intro?.title || '';
    document.getElementById('projectsIntroBody').textContent = page.intro?.body || '';
    document.getElementById('projectsClosingLabel').textContent = page.closing?.label || '';
    document.getElementById('projectsClosingTitle').textContent = page.closing?.title || '';
    document.getElementById('projectsClosingBody').textContent = page.closing?.body || '';
    document.getElementById('projectsClosingAction').textContent = page.closing?.action || 'Jetzt Anfrage senden';

    const normalizedProjects = projects.map(project => ({
      ...project,
      normalizedImages: normalizeImages(project)
    }));

    document.getElementById('projectsGrid').innerHTML = normalizedProjects.map((project, index) => {
      const images = project.normalizedImages;
      const placement = project.placement === 'top-right' ? 'is-top-right' : 'is-bottom-right';
      return `
      <article class="project-band ${placement}" data-project-index="${index}">
        <div class="project-media ${images.length > 1 ? 'has-slideshow' : ''}" ${images.length > 1 ? `data-slideshow-interval="${project.interval || 4200}"` : ''}>
          ${images.map((image, imageIndex) => `
            <div class="project-frame ${imageIndex === 0 ? 'is-active' : ''}">
              <img class="project-frame-bg" src="${image.src}" alt="" aria-hidden="true" loading="${index === 0 && imageIndex === 0 ? 'eager' : 'lazy'}" decoding="async">
              <img class="project-frame-main" src="${image.src}" alt="${image.alt || project.title || 'Projektbild'}" style="${image.style || ''}" loading="${index === 0 && imageIndex === 0 ? 'eager' : 'lazy'}" decoding="async" data-project-index="${index}" data-image-index="${imageIndex}">
            </div>
          `).join('')}
        </div>
        <div class="project-copy">
          <span class="project-category">${project.category}</span>
          <h3>${project.title}</h3>
          <p>${project.excerpt}</p>
          <div class="project-tags">
            ${project.stats.map(stat => `<span>${stat}</span>`).join('')}
          </div>
        </div>
      </article>
    `;
    }).join('');

    const closingImages = Array.isArray(page.closingImages) && page.closingImages.length
      ? page.closingImages.map(image => ({ ...image, src: asset(image.src) }))
      : normalizedProjects.flatMap(project => project.normalizedImages).slice(0, 5);

    document.getElementById('closingBg').innerHTML = closingImages.slice(0, 5).map(image => `
      <div class="tile">
        <img src="${image.src}" alt="${image.alt || 'Projektbild'}" loading="lazy" decoding="async">
      </div>
    `).join('');

    document.querySelectorAll('.project-media.has-slideshow').forEach(media => {
      const frames = Array.from(media.querySelectorAll('.project-frame'));
      if (frames.length < 2) return;
      const interval = Number(media.dataset.slideshowInterval) || 4200;
      let activeIndex = 0;
      window.setInterval(() => {
        frames[activeIndex].classList.remove('is-active');
        activeIndex = (activeIndex + 1) % frames.length;
        frames[activeIndex].classList.add('is-active');
      }, interval);
    });

    const lightbox = document.getElementById('galleryLightbox');
    const lightboxDialog = lightbox.querySelector('.gallery-lightbox-dialog');
    const lightboxImage = document.getElementById('galleryLightboxImage');
    const lightboxCount = document.getElementById('galleryLightboxCount');
    const lightboxPrev = document.getElementById('galleryLightboxPrev');
    const lightboxNext = document.getElementById('galleryLightboxNext');
    const lightboxClose = document.getElementById('galleryLightboxClose');
    let activeProjectIndex = 0;
    let activeImageIndex = 0;
    let touchStartX = 0;

    function renderLightbox() {
      const project = normalizedProjects[activeProjectIndex];
      if (!project || !project.normalizedImages?.length) return;
      const image = project.normalizedImages[activeImageIndex];
      if (!image) return;
      lightboxImage.src = image.src;
      lightboxImage.alt = image.alt || project.title || 'Projektbild';
      lightboxImage.style.cssText = image.style || '';
      lightboxCount.textContent = `${activeImageIndex + 1} / ${project.normalizedImages.length}`;
      lightboxPrev.style.display = project.normalizedImages.length > 1 ? 'inline-flex' : 'none';
      lightboxNext.style.display = project.normalizedImages.length > 1 ? 'inline-flex' : 'none';
    }

    function openLightbox(projectIndex, imageIndex) {
      activeProjectIndex = Number(projectIndex) || 0;
      activeImageIndex = Number(imageIndex) || 0;
      renderLightbox();
      lightbox.classList.add('is-open');
      lightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('is-open');
      lightbox.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function moveLightbox(step) {
      const project = normalizedProjects[activeProjectIndex];
      if (!project || !project.normalizedImages?.length) return;
      activeImageIndex = (activeImageIndex + step + project.normalizedImages.length) % project.normalizedImages.length;
      renderLightbox();
    }

    document.querySelectorAll('.project-frame-main').forEach(image => {
      image.addEventListener('click', () => {
        openLightbox(image.dataset.projectIndex, image.dataset.imageIndex);
      });
    });

    lightboxClose.addEventListener('click', closeLightbox);
    lightboxPrev.addEventListener('click', () => moveLightbox(-1));
    lightboxNext.addEventListener('click', () => moveLightbox(1));
    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) closeLightbox();
    });
    document.addEventListener('keydown', (event) => {
      if (!lightbox.classList.contains('is-open')) return;
      if (event.key === 'Escape') closeLightbox();
      if (event.key === 'ArrowLeft') moveLightbox(-1);
      if (event.key === 'ArrowRight') moveLightbox(1);
    });
    lightboxDialog.addEventListener('touchstart', (event) => {
      touchStartX = event.changedTouches[0]?.clientX || 0;
    }, { passive: true });
    lightboxDialog.addEventListener('touchend', (event) => {
      const touchEndX = event.changedTouches[0]?.clientX || 0;
      const delta = touchEndX - touchStartX;
      if (Math.abs(delta) < 40) return;
      if (delta > 0) moveLightbox(-1);
      else moveLightbox(1);
    }, { passive: true });

    const number = site.business?.whatsappNumber || '';
    const message = site.business?.whatsappMessage || 'Hallo Teuto Motoren';
    const cleaned = number.replace(/\D/g, '');
    const href = cleaned ? `https://wa.me/${cleaned}?text=${encodeURIComponent(message)}` : 'kontakt.html';
    document.querySelectorAll('.js-whatsapp-link').forEach(link => {
      link.setAttribute('href', href);
      if (cleaned) {
        link.setAttribute('target', '_blank');
        link.setAttribute('rel', 'noopener noreferrer');
      }
    });
  </script>
</body>
